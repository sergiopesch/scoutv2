name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: .node-version
          cache: npm
      - run: corepack enable && corepack prepare npm@10.9.8 --activate
      - run: test "$(npm --version)" = "10.9.8"
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - run: npm run build
      - name: Smoke-test the built server
        run: |
          PORT=3199 HOST=127.0.0.1 SCOUT_ALLOW_DEV_INGEST=true \
            node dist/src/server/index.js >/tmp/scout-ci.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          ready=false
          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:3199/livez >/dev/null; then
              ready=true
              break
            fi
            sleep 0.25
          done
          if [ "$ready" != true ]; then
            cat /tmp/scout-ci.log
            exit 1
          fi
          curl --fail --silent http://127.0.0.1:3199/metrics >/dev/null
          curl --fail --silent http://127.0.0.1:3199/operator/new/ | grep -q 'Checking Scout'
          kill -TERM "$server_pid"
          for attempt in {1..40}; do
            if ! kill -0 "$server_pid" 2>/dev/null; then
              wait "$server_pid"
              trap - EXIT
              exit 0
            fi
            sleep 0.25
          done
          cat /tmp/scout-ci.log
          exit 1
      - run: npm audit --omit=dev
      - run: git diff --check
