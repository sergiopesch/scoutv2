<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title description">
  <title id="title">Scout — the signal in the field</title>
  <desc id="description">A flowing route reveals one grounded signal inside a dark field.</desc>
  <defs>
    <linearGradient id="tile" x1="170" y1="100" x2="835" y2="920" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F7F7F3"/>
    </linearGradient>
    <linearGradient id="field" x1="314" y1="244" x2="734" y2="780" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#292C34"/>
      <stop offset="0.44" stop-color="#1D1F25"/>
      <stop offset="1" stop-color="#101115"/>
    </linearGradient>
    <filter id="tileShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#13151A" flood-opacity="0.18"/>
    </filter>
    <filter id="fieldShadow" x="-25%" y="-25%" width="150%" height="160%">
      <feDropShadow dx="0" dy="9" stdDeviation="10" flood-color="#13151A" flood-opacity="0.18"/>
    </filter>
    <filter id="fieldTexture" x="-8%" y="-8%" width="116%" height="116%">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="2" seed="17" result="grain"/>
      <feColorMatrix in="grain" type="matrix" values="0.055 0 0 0 0.44  0 0.055 0 0 0.46  0 0 0.055 0 0.50  0 0 0 0.16 0" result="fineGrain"/>
      <feBlend in="SourceGraphic" in2="fineGrain" mode="soft-light"/>
    </filter>
    <clipPath id="fieldClip">
      <circle cx="512" cy="512" r="302"/>
    </clipPath>
  </defs>

  <rect x="54" y="48" width="916" height="916" rx="210" fill="url(#tile)" stroke="#ECECE7" stroke-width="3" filter="url(#tileShadow)"/>

  <g filter="url(#fieldShadow)">
    <circle cx="512" cy="512" r="302" fill="url(#field)" filter="url(#fieldTexture)"/>
    <g clip-path="url(#fieldClip)">
      <path d="M786 274C768 373 688 416 604 454C540 483 502 513 507 558C512 603 557 621 524 669C491 717 404 734 262 828" fill="none" stroke="#FAFAF7" stroke-width="112" stroke-linecap="square" stroke-linejoin="round"/>
      <circle cx="512" cy="559" r="78" fill="#FAFAF7"/>
    </g>
    <circle cx="512" cy="559" r="39" fill="#17181C"/>
  </g>
</svg>
